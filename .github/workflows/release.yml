name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Toolchain version is pinned in rust-toolchain.toml.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        env:
          # Picked up at compile time via option_env! in src/cli.rs and
          # surfaced by `tmux-fingers-rs info`.
          WIZARD_INSTALLATION_METHOD: download-binary
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          name="tmux-fingers-rs-${tag}-${target}"
          stage="$(mktemp -d)/${name}"
          mkdir -p "$stage"

          cp "target/${target}/release/tmux-fingers-rs" "$stage/"
          cp README.md LICENSE "$stage/"
          # Ship the plugin script + wizard so users who download the
          # tarball get a complete TPM-style payload.
          cp tmux-fingers-rs.tmux install-wizard.sh "$stage/"

          tar -C "$(dirname "$stage")" -czf "${name}.tar.gz" "${name}"

          # SHA256 sidecar for the wizard's verification step.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          else
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi

          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: ls -laR dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.tar.gz.sha256
