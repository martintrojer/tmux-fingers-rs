name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --verbose

      # Run only the non-live test suites in CI.
      # The live_tmux suite spawns real tmux servers and control clients;
      # it can be flaky under hosted runners and is intended to be exercised
      # locally. Re-enable here once it is reliable in CI.
      - name: cargo test (unit + compliance)
        run: cargo test --lib --bins --test compliance --verbose
